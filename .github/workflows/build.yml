name: Build
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+b[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          environments: build
      - name: Build project
        run: pixi run -e build build-wheel
      - name: Check package
        run: pixi run -e build check-wheel
      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: pip
          path: dist/*
      - name: Upload bundle
        uses: actions/upload-artifact@v6
        with:
          name: cdn
          path: src/panel_material_ui/dist/
  release:
    name: Publish package
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: pip
          path: dist/
      - name: Publish package on PyPi
        uses: pypa/gh-action-pypi-publish@release/v1
  publish_cdn:
    name: Publish to CDN
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: cdn
          path: dist/
      - name: Get Tag Name
        id: get_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Upload to S3
        run: aws s3 sync ./dist s3://cdn.holoviz.org/panel-material-ui/${{ env.TAG_NAME }}/
  publish_npm:
    name: Publish npm package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          name: cdn
          path: dist/
      - name: Derive npm package version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          export TAG_NAME
          python - <<'PY'
          import os
          import re
          import sys

          tag = os.environ["TAG_NAME"]
          pattern = re.compile(r"^(\d+\.\d+\.\d+)(?:(a|b|rc)(\d+))?$")
          match = pattern.match(tag)
          if not match:
              print(f"Unsupported release tag format: {tag}", file=sys.stderr)
              sys.exit(1)

          base, prerelease_label, prerelease_number = match.groups()
          npm_version = base
          npm_tag = "latest"

          if prerelease_label:
              label_map = {"a": "alpha", "b": "beta", "rc": "rc"}
              npm_version = f"{base}-{label_map[prerelease_label]}.{prerelease_number}"
              npm_tag = "next"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"NPM_VERSION={npm_version}\n")
              env.write(f"NPM_TAG={npm_tag}\n")
          PY
      - name: Create npm package metadata
        working-directory: dist
        run: |
          cat <<EOF > package.json
          {
            "name": "@holoviz/panel-material-ui",
            "version": "${NPM_VERSION}",
            "description": "Panel Material UI frontend bundle assets.",
            "license": "BSD-3-Clause",
            "homepage": "https://github.com/panel-extensions/panel-material-ui",
            "repository": {
              "type": "git",
              "url": "https://github.com/panel-extensions/panel-material-ui.git"
            },
            "publishConfig": {
              "access": "public"
            },
            "files": [
              "*"
            ]
          }
          EOF
      - name: Copy README and license
        run: |
          cp README.md dist/README.md
          cp LICENSE.txt dist/LICENSE.txt
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: npm dev deploy
        if: contains(env.TAG, 'a') || contains(env.TAG, 'b') || contains(env.TAG, 'rc')
        working-directory: dist
        run: |
          npm publish --access public --tag dev --provenance
      - name: npm main deploy
        if: (!(contains(env.TAG, 'a') || contains(env.TAG, 'b') || contains(env.TAG, 'rc')))
        working-directory: dist
        run: |
          npm publish --access public --tag latest --provenance
